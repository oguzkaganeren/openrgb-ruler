name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/}" Cargo.toml
          cargo update --package openrgb-ruler-gtk

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libdbus-1-dev \
            pkg-config \
            build-essential

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/openrgb-ruler-gtk dist/
          tar -czf dist/openrgb-ruler-gtk-v${{ steps.version.outputs.new_version }}-linux-x86_64.tar.gz \
            -C dist openrgb-ruler-gtk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: OpenRGB Ruler v${{ steps.version.outputs.new_version }}
          draft: false
          prerelease: false
          files: dist/openrgb-ruler-gtk-v${{ steps.version.outputs.new_version }}-linux-x86_64.tar.gz
          body: |
            ## Changes in v${{ steps.version.outputs.new_version }}

            See the [commit history](https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.new_version }}) for details.

            ## Installation

            Download the `.tar.gz`, extract and run:
            ```bash
            tar -xzf openrgb-ruler-gtk-v${{ steps.version.outputs.new_version }}-linux-x86_64.tar.gz
            ./openrgb-ruler-gtk
            ```

            ## Requirements
            - GTK4 runtime libraries (`libgtk-4-1`)
            - OpenRGB must be installed and accessible in PATH
            - DBus session bus (standard on KDE/GNOME)
